<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <style>
        body {
            background-color: #f7fafc;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #D9D9D9;
            /* padding: 20px; */
            /* width: 90vw; */
            position: sticky;
            top: 0;
            backdrop-filter: blur(10px);
            background-color: rgba(217, 217, 217, 0.8);
            z-index: 100;
        }
        ul{
            display: flex;
        }
        ul li{
            list-style: none;
            margin: 0 10px;
        }
        .logo{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-family: "Martel Sans", sans-serif;
            font-weight: 500;
            font-style: normal;
            color: rgb(128, 57, 57);
        }
        .logo img {
            background: none;
            /* width: 60px;
            height: auto; */
            border-radius: 10px;
        }
        .nav-links{
            gap: 14px;
        }
        .nav-links button{
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 10px 30px 10px 30px;
            border-radius: 50px;
            border: none;
            width: 70px;
            height: 31px;
            background-color: #65558F;
            margin-right: 10px;
        }
        .nav-links a{
            text-decoration: none;
        }
        .nav-links button:hover{
            cursor: pointer;
        }
        .logo{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-family: "Martel Sans", sans-serif;
            font-weight: 500;
            font-style: normal;
            color: rgb(128, 57, 57);
            margin-left: 5px;
        }
        .logo img {
            background: none;
            margin-left: -10px; /* Added margin-left to the image */
            border-radius: 10px;
        }
        main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70vh;
        }
        .form-container {
            width: 100%;
            max-width: 400px;
            background-color: white;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .form-container h2 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 24px;
            text-align: center;
        }
        .form-container label {
            display: block;
            color: #4a5568;
            font-size: 0.875rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .form-container input {
            width: 90%;
            padding: 8px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 1rem;
            color: #4a5568;
        }
        .form-container input:focus {
            outline: none;
            border-color: #63b3ed;
            box-shadow: 0 0 0 2px rgba(66, 153, 225, 0.5);
        }
        .form-container button {
            background-color: black;
            color: white;
            font-weight: bold;
            padding: 10px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .form-container p {
            margin-top: 16px;
            text-align: center;
            color: #718096;
        }
        .form-container p a {
            color: #3182ce;
            text-decoration: none;
        }
        footer {
            background-color: #edf2f7;
            padding: 16px;
            text-align: center;
            font-size: 0.875rem;
            color: #718096;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        footer a {
            margin: 0 8px;
            color: #3182ce;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li class="logo">
                <img width="40" src="Design6.jpg" alt="">
                <p>WallpaperHub</p>
            </li>
        </ul>
        <ul class="nav-links">
            <a href="landingPage.html"><button>Home</button></a>
        </ul>
    </nav>
    <main>
        <div class="form-container">
            <h2>Sign Up</h2>
            <form>
                <label for="email">Email ID</label>
                <input id="email" type="email" placeholder="Ex: example@gmail.com" required>
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="********" required>
                <label for="confirm-password">Confirm Password</label>
                <input id="confirm-password" type="password" placeholder="********" required>
                <button type="button">Sign Up</button>
                <p>Already a User Yet? <a href="loginPage.html">Login</a></p>
            </form>
        </div>
    </main>
    <footer>
        <a href="#">Terms of service</a>
        <a href="#">Privacy Policy</a>
        <a href="#">About Us</a>
    </footer>
</body>
</html>
