<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Landing Page</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Martel+Sans:wght@200;300;400;600;700;800;900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap');

        @import url('https://fonts.googleapis.com/css2?family=Martel+Sans:wght@200;300;400;600;700;800;900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap');
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background-color: #FFFFFF;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #D9D9D9;
            padding: 20px;
            /* width: 90vw; */
            position: sticky;
            top: 0;
            backdrop-filter: blur(10px);
            background-color: rgba(217, 217, 217, 0.8);
            z-index: 100;
        }
        ul{
            display: flex;
        }
        ul li{
            list-style: none;
            margin: 0 10px;
        }
        .logo{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-family: "Martel Sans", sans-serif;
            font-weight: 500;
            font-style: normal;
            color: rgb(128, 57, 57);
        }
        .logo img {
            background: none;
            /* width: 60px;
            height: auto; */
            border-radius: 10px;
        }
        .nav-links{
            gap: 14px;
        }
        .nav-links button{
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 10px 30px 10px 30px;
            border-radius: 50px;
            border: none;
            width: 70px;
            height: 31px;
            background-color: #65558F;
        }
        .nav-links a{
            text-decoration: none;
        }
        .nav-links button:hover{
            cursor: pointer;
        }
        .first-container {
            margin-top: 30px;
            background-color: #F8F6FF;
            height: 60vh;
            max-width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .first-container img {
            width: 70%;
            height: 70%;
            object-fit: cover;
        }
        .first-container img:nth-child(1):hover,
        .first-container img:nth-child(3):hover {
            cursor: pointer;
        }
        .first-container img:nth-child(1){
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }
        .first-container img:nth-child(3){
            width: 50px;
            height: 50px;
            margin-left: 10px;
        }
        .second-container {
            margin-top: 5px;
            background-color: #F8F6FF;
            height: 60vh;
            max-width: 100vw;
            padding: 10px;
            position: relative;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }
        .second-container h1 {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            margin: 5px 0 5px 10px;
            font-family: "Poppins", sans-serif;
            font-weight: 600;
        }
        .text-container-aboutUs {
            margin-right: 20px;
            width: 382px;
            height: 325px;
            background-color: rgba(255, 182, 193, 0.2);
            backdrop-filter: blur(10px);
            padding: 5px;
            overflow: hidden;
            word-wrap: break-word;
        }
        .text-container-aboutUs h2{
            font-family: "Ubuntu", sans-serif;
            font-weight: 300;
            font-style: normal;
        }
        .text-container-aboutUs p{
            font-family: "Roboto", sans-serif;
            font-optical-sizing: auto;
            font-weight: 300;
            font-style: normal;
            font-variation-settings:
              100;
        }
        .third-container{
            margin-top: 5px;
            background-color: #F8F6FF;
            height: 20vh;
            max-width: 100vw;
        }
        section{
            padding: 10px;
        }
       @media screen and (max-width: 640px){
        .second-container h1{
            display: none;
            display: block;
            position: relative;
            z-index: 1;
        }
       }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li class="logo">
                <img width="40" src="Design6.jpg" alt="">
                <p>WallpaperHub</p>
            </li>
        </ul>
        <ul class="nav-links">
            <button>Explore</button>
            <a href="loginPage.html"><button>Login</button></a>
        </ul>
    </nav>
    <section>
        <div class="first-container">
            <img src="lArrow.svg" alt="">
            <img src="https://images.unsplash.com/photo-1741807117240-0aee0cd41d25?q=80&w=2944&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Mountain Image">
            <img src="rArrow.svg" alt="">
        </div>
    </section>
    <section>
        <div class="second-container">
            <h1>About us here</h1>
            <div class="text-container-aboutUs">
                <h4>About Us</h4>
                <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Sint numquam dolores quod enim consequatur? Autem animi officia, ut, nulla sit hic deleniti consequuntur modi libero, unde culpa mollitia. Vitae, repellendus.</p>
            </div>
        </div>
    </section>
    <section>
        <div class="third-container">
            
        </div>
    </section>
</body>
</html>
