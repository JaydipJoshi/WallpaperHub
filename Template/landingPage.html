<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Landing Page</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background-color: #FFFFFF;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #D9D9D9;
            padding: 20px;
            /* width: 90vw; */
        }
        ul{
            display: flex;
        }
        ul li{
            list-style: none;
            margin: 0 10px;
        }
        .nav-links{
            gap: 14px;
        }
        .nav-links button{
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 10px 30px 10px 30px;
            border-radius: 50px;
            border: none;
            width: 74px;
            height: 31px;
            background-color: #65558F;
        }
        .nav-links button:hover{
            cursor: pointer;
        }
        .first-container {
            margin-top: 30px;
            background-color: #F8F6FF;
            height: 60vh;
            max-width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .first-container img {
            width: 70%;
            height: 70%;
            object-fit: cover;
        }
        .second-container{
            margin-top: 5px;
            background-color: #F8F6FF;
            height: 60vh;
            max-width: 100vw;
            border: 1px solid black;
        }
        .third-container{
            margin-top: 5px;
            background-color: #F8F6FF;
            height: 20vh;
            max-width: 100vw;
            border: 1px solid black;
        }
        section{
            padding: 10px;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li>Logo</li>
        </ul>
        <ul class="nav-links">
            <button>Explore</button>
            <button>Login</button>
        </ul>
    </nav>
    <section>
        <div class="first-container">
            <img src="https://images.unsplash.com/photo-1741807117240-0aee0cd41d25?q=80&w=2944&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Mountain Image">
        </div>
    </section>
    <section>
        <div class="second-container">
            
        </div>
    </section>
    <section>
        <div class="third-container">
            
        </div>
    </section>
</body>
</html>
